<section style="margin-bottom:16px;">
  <h2 style="margin-top:0;">渲染器设置</h2>
  <div style="background:#fff;padding:16px;border:1px solid #ddd;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.1);margin-bottom:16px;">
    <h3>背景颜色</h3>
    <input type="color" id="bgColor" value="#ffffff" style="width:100%;padding:4px;">
  </div>
  <div style="background:#fff;padding:16px;border:1px solid #ddd;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.1);margin-bottom:16px;">
    <h3>光源颜色</h3>
    <input type="color" id="lightColor" value="#ffffff" style="width:100%;padding:4px;">
  </div>
  <div style="background:#fff;padding:16px;border:1px solid #ddd;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.1);margin-bottom:16px;">
    <h3>光源强度</h3>
    <label>强度: <span id="lightIntensityVal">1.0</span></label><br>
    <input type="range" id="lightIntensity" min="0" max="3" step="0.1" value="1" style="width:100%;">
  </div>
  <div style="background:#fff;padding:16px;border:1px solid #ddd;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.1);margin-bottom:16px;">
    <h3>抗锯齿</h3>
    <label><input type="checkbox" id="aaToggle" checked> 启用抗锯齿</label>
  </div>
  <div style="background:#fff;padding:16px;border:1px solid #ddd;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.1);margin-bottom:16px;">
    <h3>视野 (FOV)</h3>
    <label>FOV: <span id="fovVal">60</span>°</label><br>
    <input type="range" id="fov" min="30" max="120" step="1" value="60" style="width:100%;">
  </div>
  <div style="text-align:right;">
    <button class="btn" id="saveBtn" style="background-color:#3498db;color:#fff;border:none;padding:8px 16px;font-size:16px;cursor:pointer;border-radius:8px;margin-right:8px;">保存设置</button>
    <button class="btn" id="resetBtn" style="background-color:#3498db;color:#fff;border:none;padding:8px 16px;font-size:16px;cursor:pointer;border-radius:8px;">重置为默认</button>
  </div>
</section>

<script>
  const STORAGE_KEY = 'editorSettings';
  const defaults = {
    bgColor: '#ffffff',
    lightColor: '#ffffff',
    lightIntensity: 1.0,
    aaEnabled: true,
    fov: 60
  };
  function loadSettings(){
    const stored = localStorage.getItem(STORAGE_KEY);
    const settings = stored ? JSON.parse(stored) : defaults;
    document.getElementById('bgColor').value = settings.bgColor;
    document.getElementById('lightColor').value = settings.lightColor;
    document.getElementById('lightIntensity').value = settings.lightIntensity;
    document.getElementById('lightIntensityVal').textContent = settings.lightIntensity;
    document.getElementById('aaToggle').checked = settings.aaEnabled;
    document.getElementById('fov').value = settings.fov;
    document.getElementById('fovVal').textContent = settings.fov;
  }
  function saveSettings(){
    const settings = {
      bgColor: document.getElementById('bgColor').value,
      lightColor: document.getElementById('lightColor').value,
      lightIntensity: parseFloat(document.getElementById('lightIntensity').value),
      aaEnabled: document.getElementById('aaToggle').checked,
      fov: parseInt(document.getElementById('fov').value,10)
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    alert('设置已保存');
  }
  function resetSettings(){
    document.getElementById('bgColor').value = defaults.bgColor;
    document.getElementById('lightColor').value = defaults.lightColor;
    document.getElementById('lightIntensity').value = defaults.lightIntensity;
    document.getElementById('lightIntensityVal').textContent = defaults.lightIntensity;
    document.getElementById('aaToggle').checked = defaults.aaEnabled;
    document.getElementById('fov').value = defaults.fov;
    document.getElementById('fovVal').textContent = defaults.fov;
  }
  document.getElementById('saveBtn').addEventListener('click', saveSettings);
  document.getElementById('resetBtn').addEventListener('click', resetSettings);
  document.getElementById('lightIntensity').addEventListener('input', e=>{
    document.getElementById('lightIntensityVal').textContent = e.target.value;
  });
  document.getElementById('fov').addEventListener('input', e=>{
    document.getElementById('fovVal').textContent = e.target.value;
  });
  loadSettings();
</script>
