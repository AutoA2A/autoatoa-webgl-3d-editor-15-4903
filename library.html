<section>
    <h2>模型库</h2>
    <input type="text" id="modelSearch" placeholder="搜索模型…">
    <div class="grid-row" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;" id="modelGrid">
    </div>
</section>
<script>
/* model data */
const models = [
    {name:"彩色立方体", thumb:"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwIiBoZWlnaHQ9IjEyMCIgdmlld0JveD0iMCAwIDQwIDQwIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxjaXJjbGUgY3g9IjIwIiBjeT0iMjAiIHI9IjIwIiBmaWxsPSIjRkZEMDAwIi8+PHRleHQgeD0iMjAiIHk9IjI1IiBmb250LXNpemU9IjEwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjMDAwIj5UZXJtPC90ZXh0Pjwvc3ZnPg==", glb:"data:application/octet-stream;base64,AAABAAIAAQAMABAAAHt3AACgAwAAAqQAAJRUAAAcfwAAdO8AAA=="},
    {name:"简易球体", thumb:"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwIiBoZWlnaHQ9IjEyMCIgdmlld0JveD0iMCAwIDQwIDQwIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxjaXJjbGUgY3g9IjIwIiBjeT0iMjAiIHI9IjIwIiBmaWxsPSIjMDBGRjAwIi8+PHRleHQgeD0iMjAiIHk9IjI1IiBmb250LXNpemU9IjEwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjMDAwIj5TdW4gPC90ZXh0Pjwvc3ZnPg==", glb:"data:application/octet-stream;base64,AAABAAIAAQAMABAAAHt3AACgAwAAAqQAAJRUAAAcfwAAdO8AAA=="}
];
function renderModels(filter=''){
    const grid = document.getElementById('modelGrid');
    grid.innerHTML = '';
    const filtered = models.filter(m=>m.name.includes(filter));
    filtered.forEach(m=>{
        const card = document.createElement('article');
        card.className = 'card';
        // media component
        const media = document.createElement('div');
        media.className = 'media';
        media.innerHTML = `<img src="${m.thumb}" alt="${m.name}" style="width:100px;height:100px;margin-right:16px;border-radius:8px;"><div><h3>${m.name}</h3><p></p></div>`;
        // button
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.textContent = '导入';
        btn.onclick = () => {
            const id = encodeURIComponent(m.name);
            window.location.href = `index.html?id=${id}`;
        };
        card.appendChild(media);
        card.appendChild(btn);
        grid.appendChild(card);
    });
}
document.getElementById('modelSearch').addEventListener('input', e=> renderModels(e.target.value.trim()));
renderModels();
</script>
