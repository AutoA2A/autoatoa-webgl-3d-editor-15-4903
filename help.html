<section style="margin-bottom: 16px;"><h2 style="margin-top: 0;">帮助与教程</h2><p>交互式教程，指导如何使用编辑器功能。</p></section>

<article class="card" style="background-color: #fff; padding: 16px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.1);"><h3>交互式教程</h3><p id="tutorialStep"></p></article>

<section style="margin-bottom: 16px;"><h2 style="margin-top: 0;">操作</h2><p>
  <button class="btn" id="prevBtn">上一步</button>&nbsp;
  <button class="btn" id="nextBtn">下一步</button>&nbsp;
  <button class="btn" id="openEditorBtn">打开编辑器 (index.html)</button>
</p></section>

<script>
(() => {
  const steps = [
    {title: "1️⃣ 加载模型", content: "点击左侧工具栏的「导入模型」按钮，选择本地的 GLTF/OBJ 文件，文件会自动加载到场景中。<br>（若已在编辑器打开，可直接在编辑器页面操作）", action: () => window.open('import.html','_blank')},
    {title: "2️⃣ 选择与移动对象", content: "在场景视图中点击模型即可选中。使用右侧的移动工具（快捷键 <code>W</code>）拖动模型到合适位置。", action: null},
    {title: "3️⃣ 旋转与缩放", content: "使用旋转工具（<code>E</code>）或缩放工具（<code>R</code>）对选中的模型进行细节调整。", action: null},
    {title: "4️⃣ 材质编辑", content: "在右侧面板中可以更改模型的颜色、金属度、粗糙度等材质属性，实时预览效果。", action: null},
    {title: "5️⃣ 添加光源", content: "点击「添加光源」按钮，可在场景中放置点光、平行光或环境光，调节光照强度与颜色。", action: null},
    {title: "6️⃣ 动画预览", content: "如果模型包含动画，点击「播放」按钮即可预览动画效果。也可以在时间轴上拖动关键帧进行编辑。", action: null},
    {title: "7️⃣ 保存与导出", content: "完成编辑后，点击「导出模型」按钮，可将场景保存为 GLTF 或 OBJ 文件下载到本地。", action: () => window.open('export.html','_blank')},
    {title: "✅ 完成", content: "恭喜！您已经掌握了基本的编辑流程。随时返回此页面复习，或在编辑器中探索更多高级功能。", action: null}
  ];
  let current = 0;
  const stepEl = document.getElementById('tutorialStep');
  function render() {
    const s = steps[current];
    stepEl.innerHTML = `<strong>${s.title}</strong><br>${s.content}`;
  }
  document.getElementById('prevBtn').onclick = () => { if(current>0){current--; render();} };
  document.getElementById('nextBtn').onclick = () => { if(current<steps.length-1){current++; render();} };
  document.getElementById('openEditorBtn').onclick = () => window.open('index.html','_blank');
  render();
})();
</script>
